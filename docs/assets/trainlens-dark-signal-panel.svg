<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="trainlens-signal-panel-title trainlens-signal-panel-description">
<title id="trainlens-signal-panel-title">TrainLens signal panel</title>
<desc id="trainlens-signal-panel-description">Severity panel showing training risks and useful findings.</desc>
<rect width="920" height="420" fill="#0b1020" />
<rect x="18" y="18" width="884" height="384" rx="18" fill="#111827" stroke="#293246" />
<text x="42.0" y="46.0" fill="#e5edf6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Signal Panel</text>
<text x="42.0" y="70.0" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Training risks and useful findings, ordered for quick inspection</text>
<rect x="42.0" y="104.0" width="830.0" height="42.0" rx="9.0" fill="#172033" opacity="0.90" />
<rect x="42.0" y="104.0" width="564.4" height="42.0" rx="9.0" fill="#f59e0b" opacity="0.20" />
<rect x="42.0" y="104.0" width="8.0" height="42.0" rx="4.0" fill="#f59e0b" opacity="1.00" />
<text x="66.0" y="122.0" fill="#e5edf6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Loss plateau detected</text>
<text x="66.0" y="139.0" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">validation_loss has barely moved over the last checkpoints.</text>
<text x="806.0" y="130.0" fill="#f59e0b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">WARNING</text>
<rect x="42.0" y="162.0" width="830.0" height="42.0" rx="9.0" fill="#172033" opacity="0.90" />
<rect x="42.0" y="162.0" width="564.4" height="42.0" rx="9.0" fill="#f59e0b" opacity="0.20" />
<rect x="42.0" y="162.0" width="8.0" height="42.0" rx="4.0" fill="#f59e0b" opacity="1.00" />
<text x="66.0" y="180.0" fill="#e5edf6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Very small adapter rank</text>
<text x="66.0" y="197.0" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">LoRA/adapters may be under-capacity for the target task.</text>
<text x="806.0" y="188.0" fill="#f59e0b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">WARNING</text>
</svg>
